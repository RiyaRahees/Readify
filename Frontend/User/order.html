    <style>
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            background: #fff;
            padding: 10px;
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 100px;
            /* Synced with sidebar top */
            z-index: 10;
        }

        .filter-btn {
            padding: 8px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            background: transparent;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .filter-btn:hover {
            background: #f1f5f9;
            color: var(--text-main);
        }

        .filter-btn.active {
            background: var(--primary-gradient);
            color: #fff;
        }

        /* Responsive filter bar adjustments */
        @media (max-width: 768px) {
            .filter-bar {
                top: 80px;
                overflow-x: auto;
                white-space: nowrap;
                gap: 8px;
                padding: 8px;
            }
            .filter-btn {
                padding: 6px 16px;
                font-size: 13px;
                flex-shrink: 0;
            }
        }



        /* Order Tracking Timeline */
        .tracking-timeline {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin-top: 30px;
            padding: 0 10px;
        }

        .tracking-timeline::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 20px;
            right: 20px;
            height: 2px;
            background: #e2e8f0;
            z-index: 1;
        }

        .step {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .step-dot {
            width: 22px;
            height: 22px;
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 50%;
            margin: 0 auto 8px;
        }

        .step.completed .step-dot {
            background: var(--primary-color);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .step.completed::after {
            content: '';
            position: absolute;
            top: 10px;
            left: -50%;
            width: 100%;
            height: 2px;
            background: var(--primary-color);
            z-index: -1;
        }

        .step:first-child::after {
            display: none;
        }

        .step-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .step.completed .step-label {
            color: var(--text-main);
        }
    </style>
    <script src="alert-override.js"></script>

    <script src="../apiConfig.js"></script>
</head>

    <script>

const userId =
    localStorage.getItem("userId");

let allOrdersList = [];

async function loadOrders() {
    try {
        const response = await fetch(
            `${API_BASE_URL}/api/orders/user/${userId}`
        );
        allOrdersList = await response.json();
        renderOrders(allOrdersList);
    } catch (error) {
        console.log(error);
    }
}

function renderOrders(orders) {
    const container = document.getElementById("ordersContainer");
    if (!container) return;

    if (!orders.length) {
        container.innerHTML = `
            <div class="premium-card p-5 text-center">
                <h4>No Orders Found</h4>
                <a href="shop.html" class="btn-premium mt-3">
                    Start Shopping
                </a>
            </div>
        `;
        return;
    }

    container.innerHTML = orders.map(order => {
        const firstItem = order.items[0];
        const image = firstItem?.product?.image || "";
        const productName = firstItem?.product?.name || "Product";
        const orderDate = new Date(order.createdAt).toLocaleDateString();

        let badgeClass = "status-pending";
        if (order.orderStatus === "Delivered") {
            badgeClass = "status-delivered";
        }
        if (order.orderStatus === "Cancelled") {
            badgeClass = "status-cancelled";
        }

        return `
            <div class="premium-card order-card">
                <div class="order-header">
                    <div>
                        <span class="order-id">
                            Order #${order._id.slice(-6).toUpperCase()}
                        </span>
                        <span class="mx-2 text-muted">•</span>
                        <span class="order-date">
                            ${orderDate}
                        </span>
                    </div>
                    <span class="order-status-badge ${badgeClass}">
                        ${order.orderStatus}
                    </span>
                </div>
                <div class="order-body">
                    <img src="${image}" class="order-product-img">
                    <div class="order-product-info flex-grow-1">
                        <h5>${productName}</h5>
                        <p>${order.items.length} item(s)</p>
                        <p class="fw-bold text-dark mt-2">₹${order.total}</p>
                    </div>
                    <div class="order-actions d-flex flex-column gap-2">
                        <button class="btn-premium" onclick="viewOrder('${order._id}')">
                            View Order
                        </button>
                    </div>
                </div>
                ${generateTimeline(order.orderStatus)}
            </div>
        `;
    }).join("");
}

function filterOrders(btn, status) {
    // 1. Toggle active classes on tab buttons
    const buttons = document.querySelectorAll(".filter-btn");
    buttons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    // 2. Filter list based on selected state
    if (status === "all") {
        renderOrders(allOrdersList);
    } else {
        const filtered = allOrdersList.filter(order => {
            const orderStatusLower = order.orderStatus.toLowerCase();
            return orderStatusLower === status.toLowerCase();
        });
        renderOrders(filtered);
    }
}

function generateTimeline(status) {

    const steps = [

        "Pending",
        "Processed",
        "Shipped",
        "Delivered"

    ];

    let current = 0;

    if(status === "Processed")
        current = 1;

    if(status === "Shipped")
        current = 2;

    if(status === "Delivered")
        current = 3;

    return `

    <div class="tracking-timeline">

        ${steps.map((step,index)=>`

            <div
            class="step
            ${index <= current
            ? "completed"
            : ""}">

                <div
                class="step-dot">

                </div>

                <div
                class="step-label">

                    ${step}

                </div>

            </div>

        `).join("")}

    </div>

    `;
}

function viewOrder(orderId){

    window.location.href =
    `order-details.html?orderId=${orderId}`;

}

loadOrders();

// Mobile Menu Toggle
const mobileMenuBtn = document.getElementById('mobileMenuBtn');
const mainNav = document.getElementById('mainNav');
if (mobileMenuBtn && mainNav) {
    mobileMenuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        mainNav.classList.toggle('active');
        mobileMenuBtn.classList.toggle('active');
    });
    
    // Close menu when clicking outside
    document.addEventListener('click', (e) => {
        if (!mainNav.contains(e.target) && !mobileMenuBtn.contains(e.target)) {
            mainNav.classList.remove('active');
            mobileMenuBtn.classList.remove('active');
        }
    });
}

async function updateCartBadge() {
    const userId = localStorage.getItem("userId");
    if (!userId) return;
    try {
        const res = await fetch(`${API_BASE_URL}/api/cart/${userId}`);
        if (res.ok) {
            const data = await res.json();
            const badge = document.querySelector(".cart-badge");
            if (badge && data && data.cart) {
                badge.innerText = data.cart.length;
            }
        }
    } catch(err) {
        console.error(err);
    }
}
updateCartBadge();

</script>
